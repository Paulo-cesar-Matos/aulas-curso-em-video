<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Teste de Favicon</title>
<!--/*fiz com ia ;(*/ -->
    <style>
  /* Estilo da palavra clicável */
  .palavra-clicavel {
    color: blue;
    text-decoration: underline;
    cursor: pointer;
  }

  /* Estilo da janela/modal */
  .modal {
    display: none; /* Escondido por padrão */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  .modal-content {
    position: relative;
    background: #fff;
    padding: 10px;
    border-radius: 8px;
    max-width: 800px;
    width: 90%;
  }

  /* Botão de fechar */
  .close {
    position: absolute;
    top: 5px;
    right: 10px;
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
  }

  /* Vídeo responsivo */
  video {
    width: 100%;
    height: auto;
    border-radius: 8px;
  }
</style>
</head>
<!-- frase -->
<body>
    <h1>Olha o favicon aqui <span class="palavra-clicavel" id="abrirVideo" style="color: black; text-decoration-line: none;">em cima</span> </h1>
    <p>&#x1F446; &#x261D; &#x1F446; &#x261D; &#x1F446; &#x261D; &#x1F446; &#x261D; &#x1F446; &#x261D; &#x1F446; &#x261D; &#x1F446; &#x261D; &#x1F446; </p>
    
<!-- Modal com vídeo -->
<div class="modal" id="modalVideo">
  <div class="modal-content">
    <span class="close" id="fecharModal">&times;</span>
    <abbr title="vc ainda está procurando o ícone?">
        <video src="griffin-jumbo.mp4" autoplay loop muted>vc ainda está procurando o ícone?</video>
    </abbr>
  </div>
</div>

<script>
  const abrirVideo = document.getElementById('abrirVideo');
  const modalVideo = document.getElementById('modalVideo');
  const fecharModal = document.getElementById('fecharModal');

  // Abrir modal
  abrirVideo.addEventListener('click', () => {
    modalVideo.style.display = 'flex';
  });

  // Fechar modal ao clicar no X
  fecharModal.addEventListener('click', () => {
    modalVideo.style.display = 'none';
  });

  // Fechar modal ao clicar fora do conteúdo
  window.addEventListener('click', (e) => {
    if (e.target === modalVideo) {
      modalVideo.style.display = 'none';
    }
  });
</script>

</body>
</html>
